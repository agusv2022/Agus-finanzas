const STORAGE_KEY = "finanzIA_data";

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return DEFAULT_DATA;
    const parsed = JSON.parse(saved);
    const savedTxIds = new Set(parsed.transactions.map(t => t.id));
    const newTx = DEFAULT_DATA.transactions.filter(t => !savedTxIds.has(t.id));
    const savedDebtIds = new Set(parsed.debts.map(d => d.id));
    const newDebts = DEFAULT_DATA.debts.filter(d => !savedDebtIds.has(d.id));
    return {
      ...parsed,
      transactions: [...parsed.transactions, ...newTx],
      debts: [...parsed.debts, ...newDebts],
      balances: { ...DEFAULT_DATA.balances, ...(parsed.balances || {}) },
    };
  } catch { return DEFAULT_DATA; }
}

    const totalDebt = data.debts.reduce((s,d)=>s+Math.max(0,d.total-d.paid),0);
    const expByCategory = {};
    monthTx.filter((t)=>t.type==="expense").forEach((t)=>{ expByCategory[t.category]=(expByCategory[t.category]||0)+t.amount; });
    return { income, expenses, balance, totalDebt, expByCategory, monthTx };
  }, [data, month]);

  const totalMonthlyDebt = data.debts.filter(d=>d.monthlyPayment>0).reduce((s,d)=>s+d.monthlyPayment,0);

  const healthScore = useMemo(() => {
    let score = 100;
    if (stats.balance < 0) score -= 25;
    const realIncome = 2650;
    const debtRatio  = totalMonthlyDebt / realIncome;
    if (debtRatio > 0.4) score -= 25;
    else if (debtRatio > 0.25) score -= 15;
    const totalDebtVsIncome = stats.totalDebt / (realIncome * 12);
    if (totalDebtVsIncome > 1) score -= 15;
    return Math.max(0, Math.min(100, score));
  }, [stats, totalMonthlyDebt]);

  const patrimony = useMemo(() => {
    const bal      = data.balances || {};
    const arsRate  = bal.arsRate   || 1700;
    const savingsEUR = bal.savings || 0;
    const xrpEUR     = bal.xrp    || 0;
    const solEUR     = (bal.solEUR || 0) * (bal.sol || 0);
    const lemonEUR   = Math.round((bal.lemonARS || 0) / arsRate);
    const klarnaEUR  = bal.klarna  || 0;
    const total = savingsEUR + xrpEUR + solEUR + lemonEUR + klarnaEUR;
    return { savingsEUR, xrpEUR, solEUR, lemonEUR, klarnaEUR, total,
             sol: bal.sol || 0, lemonARS: bal.lemonARS || 0 };
  }, [data.balances]);

  const scoreColor = healthScore>=70?"#4ade80":healthScore>=40?"#fbbf24":"#f87171";
  const scoreLabel = healthScore>=70?"Saludable":healthScore>=40?"Atención":"Crítico";

  const openModal = (type, item=null) => {
    setModal(type);
    if (item) setForm({...item});
    else if (type==="transaction") setForm({type:"expense",category:"Alimentación",amount:"",date:today(),note:""});
    else if (type==="debt")        setForm({name:"",total:"",paid:"0",interest:"0",monthlyPayment:"0",due:today(),note:"",currency:"EUR"});
    else if (type==="goal")        setForm({name:"",target:"",saved:"0",deadline:today(),icon:"🎯"});
  };

  const saveTransaction = () => {
    if (!form.amount || !form.category) return;
    const tx = {...form, amount:parseFloat(form.amount), id:form.id||Date.now()};
    setData((d)=>({...d, transactions:form.id?d.transactions.map((t)=>t.id===tx.id?tx:t):[...d.transactions,tx]}));
    setModal(null);
  };
  const saveDebt = () => {
    if (!form.name || !form.total) return;
    const debt = {...form, total:parseFloat(form.total), paid:parseFloat(form.paid||0), interest:parseFloat(form.interest||0), monthlyPayment:parseFloat(form.monthlyPayment||0), id:form.id||Date.now()};
    setData((d)=>({...d, debts:form.id?d.debts.map((x)=>x.id===debt.id?debt:x):[...d.debts,debt]}));
    setModal(null);
  };
  const saveGoal = () => {
    if (!form.name || !form.target) return;
    const goal = {...form, target:parseFloat(form.target), saved:parseFloat(form.saved||0), id:form.id||Date.now()};
    setData((d)=>({...d, goals:form.id?d.goals.map((x)=>x.id===goal.id?goal:x):[...d.goals,goal]}));
    setModal(null);
  };
  const deleteItem  = (type, id) => setData((d)=>({...d, [type]:d[type].filter((x)=>x.id!==id)}));
  const saveBudget  = (cat, val) => setData((d)=>({...d, budget:{...d.budget,[cat]:parseFloat(val)||0}}));
  const filteredTx  = data.transactions.filter((t)=>filter==="all"||t.type===filter).sort((a,b)=>b.date.localeCompare(a.date));

  const resetData = () => {
    if (confirm("¿Restaurar todos los datos al estado inicial? Esto borrará los cambios guardados.")) {
      setData(DEFAULT_DATA);
    }
  };

  return (
    <div style={{fontFamily:"'DM Mono',monospace",background:"#0a0a0f",minHeight:"100vh",color:"#e2e8f0"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0a0f}::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
        .card{background:#111118;border:1px solid #1e1e2e;border-radius:16px;padding:20px;transition:border-color .2s}
        .card:hover{border-color:#2e2e4e}
        .btn{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .15s}
        .btn-primary{background:#6366f1;color:white}.btn-primary:hover{background:#818cf8;transform:translateY(-1px)}
        .btn-ghost{background:transparent;color:#94a3b8;border:1px solid #1e1e2e}.btn-ghost:hover{border-color:#6366f1;color:#e2e8f0}
        .btn-danger{background:transparent;color:#f87171;border:1px solid #2a1a1a;font-size:11px;padding:4px 10px;border-radius:6px}.btn-danger:hover{background:#f8717122}
        .input{background:#0d0d15;border:1px solid #1e1e2e;color:#e2e8f0;padding:10px 12px;border-radius:10px;font-family:inherit;font-size:13px;width:100%;outline:none}
        .input:focus{border-color:#6366f1}
        select.input option{background:#111118}
        .tab{padding:10px 16px;background:transparent;border:none;color:#64748b;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
        .tab.active{color:#a5b4fc;border-bottom-color:#6366f1}
        .tab:hover:not(.active){color:#94a3b8}
        .progress-bar{height:6px;background:#1e1e2e;border-radius:3px;overflow:hidden}
        .progress-fill{height:100%;border-radius:3px;transition:width .5s ease}
        .overlay{position:fixed;inset:0;background:#000000cc;backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
        .modal{background:#111118;border:1px solid #2e2e4e;border-radius:20px;padding:28px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
        .tx-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #0d0d15}
        .tx-row:last-child{border-bottom:none}
        .badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .fade-in{animation:fadeIn .3s ease forwards}
        @media(max-width:600px){.grid2{grid-template-columns:1fr}}
        input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer;margin:4px 0}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid #0a0a0f}
        /* Bottom nav */
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111118cc;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid #1e1e2e;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0px)}
        .bottom-tab{flex:1;background:transparent;border:none;color:#475569;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;gap:2px;font-family:'DM Mono',monospace;transition:all .15s;-webkit-tap-highlight-color:transparent}
        .bottom-tab span.icon{font-size:20px;line-height:1}
        .bottom-tab span.lbl{font-size:9px;letter-spacing:.04em;text-transform:uppercase}
        .bottom-tab.active{color:#818cf8}
        .bottom-tab.active span.icon{filter:drop-shadow(0 0 6px #6366f188)}
        /* Desktop: hide bottom nav */
        @media(min-width:641px){.bottom-nav{display:none!important}}
        /* Mobile */
        @media(max-width:640px){
          .top-nav{display:none!important}
          .page-wrap{padding:16px 14px 88px!important}
          .grid2{grid-template-columns:1fr!important}
          .modal{padding:20px 16px}
          .header-wrap{padding:env(safe-area-inset-top,16px) 16px 0!important;padding-top:calc(env(safe-area-inset-top,0px) + 16px)!important}
        }
        /* Card shine */
        .card{position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 60%);pointer-events:none}
        /* Amount font */
        .amount{font-size:20px;font-weight:700;font-family:'Syne',sans-serif;margin-top:4px}
      `}</style>

      <div className="header-wrap" style={{padding:"20px 24px 0",maxWidth:900,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,letterSpacing:"-0.02em"}}>
              finanz<span style={{color:"#6366f1"}}>IA</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
              <input type="month" value={month} onChange={(e)=>setMonth(e.target.value)}

              <span style={{fontSize:11,color:"#475569"}}>· Dublin 🇮🇪</span>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Salud financiera</div>
            <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end"}}>
              <div style={{fontSize:24,fontWeight:700,color:scoreColor,fontFamily:"'Syne',sans-serif"}}>{healthScore}</div>
              <div style={{fontSize:11,color:scoreColor,background:scoreColor+"22",padding:"3px 8px",borderRadius:6}}>{scoreLabel}</div>
            </div>
          </div>
        </div>
        <div className="top-nav" style={{borderBottom:"1px solid #1e1e2e",display:"flex",overflowX:"auto"}}>
          {[["dashboard","📊 Resumen"],["transactions","💳 Movimientos"],["debts","⊖ Deudas"],["goals","◎ Metas"],["budget","📋 Presupuesto"],["junio","🗓️ Junio"]].map(([id,label])=>(
            <button key={id} className={`tab ${tab===id?"active":""}`} onClick={()=>setTab(id)}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"24px",maxWidth:900,margin:"0 auto"}} className="fade-in page-wrap">

        {tab==="dashboard" && (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>

            {/* ── PATRIMONIO HERO ── */}
            <div style={{background:"linear-gradient(140deg,#131330 0%,#0c1628 100%)",border:"1px solid #2a3a5e",borderRadius:22,padding:"22px 20px",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:-60,right:-30,width:180,height:180,background:"#6366f11a",borderRadius:"50%",filter:"blur(50px)",pointerEvents:"none"}}/>
              <div style={{position:"absolute",bottom:-50,left:-10,width:140,height:140,background:"#a5b4fc12",borderRadius:"50%",filter:"blur(40px)",pointerEvents:"none"}}/>
              <div style={{fontSize:11,color:"#475569",textTransform:"uppercase",letterSpacing:".12em",marginBottom:8}}>💎 Patrimonio total</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:8,marginBottom:6}}>
                <div style={{fontSize:40,fontWeight:800,fontFamily:"'Syne',sans-serif",color:"#f1f5f9",lineHeight:1,letterSpacing:"-1px"}}>{fmt(patrimony.total)}</div>
                {!patrimony.solEUR&&patrimony.sol>0&&<div style={{fontSize:12,color:"#334155",paddingBottom:6}}>+ SOL</div>}
              </div>
              <div style={{fontSize:12,color:stats.balance>=0?"#4ade80":"#f87171",marginBottom:20,display:"flex",alignItems:"center",gap:4}}>
                <span>{stats.balance>=0?"▲":"▼"}</span>
                <span>{fmt(Math.abs(stats.balance))} balance este mes</span>
              </div>
              <div style={{borderTop:"1px solid #1a2a40",paddingTop:16,display:"flex",flexDirection:"column",gap:11}}>
                {[
                  {icon:"💰",label:"Ahorro",  eur:patrimony.savingsEUR, native:null,                           color:"#a5b4fc"},
                  {icon:"🪙",label:"XRP",     eur:patrimony.xrpEUR,     native:null,                           color:"#c084fc"},
                  {icon:"🟢",label:"Solana",  eur:patrimony.solEUR,     native:`${patrimony.sol.toFixed(2)} SOL`, color:"#14f195",pending:!patrimony.solEUR&&patrimony.sol>0},
                  {icon:"🍋",label:"Lemon",   eur:patrimony.lemonEUR,   native:fmtARS(patrimony.lemonARS),     color:"#fbbf24"},
                  {icon:"🏷️",label:"Klarna",  eur:patrimony.klarnaEUR,  native:null,                           color:"#60a5fa"},
                ].map(a=>{
                  const pct=patrimony.total>0&&!a.pending?Math.max(2,(a.eur/patrimony.total)*100):0;
                  return(
                    <div key={a.label}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <span style={{fontSize:13,color:"#94a3b8"}}>{a.icon} {a.label}</span>
                        {a.pending
                          ?<span style={{fontSize:11,color:"#334155"}}>{a.native}</span>
                          :<span style={{fontSize:13,fontWeight:600,color:a.color}}>
                            {fmt(a.eur)}{a.native&&<span style={{fontSize:10,color:"#475569",marginLeft:5}}>{a.native}</span>}
                          </span>
                        }
                      </div>
                      <div style={{height:3,background:"#1a2a40",borderRadius:3}}>
                        <div style={{height:"100%",width:pct+"%",background:`linear-gradient(90deg,${a.color}99,${a.color}cc)`,borderRadius:3,transition:"width .9s ease"}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* ── STATS MES ── */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div className="card" style={{borderColor:"#4ade8033",background:"#4ade8008",padding:"14px 16px"}}>
                <div className="label">↑ Ingresos</div>
                <div style={{fontSize:26,fontWeight:800,color:"#4ade80",fontFamily:"'Syne',sans-serif",marginTop:4,letterSpacing:"-0.5px"}}>{fmt(stats.income)}</div>
              </div>
              <div className="card" style={{borderColor:"#f8717133",background:"#f8717108",padding:"14px 16px"}}>
                <div className="label">↓ Gastos</div>
                <div style={{fontSize:26,fontWeight:800,color:"#f87171",fontFamily:"'Syne',sans-serif",marginTop:4,letterSpacing:"-0.5px"}}>{fmt(stats.expenses)}</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div className="card" style={{padding:"14px 16px"}}>
                <div className="label">⚖️ Balance</div>
                <div style={{fontSize:22,fontWeight:700,color:stats.balance>=0?"#4ade80":"#f87171",fontFamily:"'Syne',sans-serif",marginTop:4}}>{fmt(stats.balance)}</div>
              </div>
              <div className="card" style={{borderColor:"#fb923c33",background:"#fb923c08",padding:"14px 16px"}}>
                <div className="label">⊖ Deuda total</div>
                <div style={{fontSize:20,fontWeight:700,color:"#fb923c",fontFamily:"'Syne',sans-serif",marginTop:4}}>{fmt(stats.totalDebt)}</div>
                <div style={{fontSize:10,color:"#64748b",marginTop:3}}>{fmtDec(totalMonthlyDebt)}/mes</div>
              </div>
            </div>

            {/* ── CUOTAS ── */}
            <div style={{background:"#130d00",border:"1px solid #2e1e00",borderRadius:14,padding:"14px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{fontSize:20}}>📅</span>
                  <div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:700,color:"#fbbf24"}}>Cuotas fijas</div>
                    <div style={{fontSize:10,color:"#64748b",marginTop:2}}>AIB €312 · Revolut ×2 €315</div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:22,fontWeight:800,color:"#fbbf24",fontFamily:"'Syne',sans-serif"}}>{fmtDec(totalMonthlyDebt)}</div>
                  <div style={{fontSize:10,color:"#64748b"}}>{((totalMonthlyDebt/2650)*100).toFixed(0)}% del sueldo</div>
                </div>
              </div>
            </div>

            <StaticTip stats={stats} healthScore={healthScore} totalMonthlyDebt={totalMonthlyDebt} />

            <div className="card">
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700,marginBottom:16,color:"#c7d2fe"}}>Gastos por categoría</div>
              {Object.entries(stats.expByCategory).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
                const budget=data.budget[cat]||0;
                const pct=budget>0?Math.min(100,(amt/budget)*100):60;
                const over=budget>0&&amt>budget;
                return (
                  <div key={cat} style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13}}>
                      <span>{ICONS[cat]||"•"} {cat}</span>
                      <span style={{color:over?"#f87171":"#94a3b8"}}>{fmt(amt)}{budget>0&&<span style={{color:"#475569"}}> / {fmt(budget)}</span>}</span>
                    </div>
                    <div className="progress-bar"><div className="progress-fill" style={{width:pct+"%",background:over?"#f87171":"#6366f1"}} /></div>
                  </div>
                );
              })}
            </div>

            <div className="card">
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700,marginBottom:12,color:"#c7d2fe"}}>Últimos movimientos</div>
              {[...data.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6).map((t)=><TxRow key={t.id} t={t} />)}
            </div>

            <div style={{textAlign:"center",paddingTop:4}}>
              <button onClick={resetData} style={{background:"transparent",border:"none",color:"#334155",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                ↺ Restaurar datos iniciales
              </button>
            </div>
          </div>
        )}

        {tab==="transactions" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>

                {[["all","Todos"],["income","Ingresos"],["expense","Gastos"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setFilter(v)}
                    style={{padding:"6px 14px",fontSize:12,background:filter===v?"#6366f1":"transparent",color:filter===v?"white":"#64748b",border:`1px solid ${filter===v?"#6366f1":"#1e1e2e"}`,borderRadius:8,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>

              </div>
              <button className="btn btn-primary" onClick={()=>openModal("transaction")}>+ Agregar</button>

              {filteredTx.length===0 && <div style={{textAlign:"center",color:"#334155",fontSize:13,padding:"20px 0"}}>Sin movimientos para este período</div>}
              {filteredTx.map((t)=>(
                <div key={t.id} className="tx-row">
                  <div className="badge" style={{background:t.type==="income"?"#4ade8011":"#f8717111"}}>{ICONS[t.category]||"•"}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:500}}>{t.category}</div>

function StaticTip({ stats, healthScore, totalMonthlyDebt }) {
  const tip = useMemo(() => {
    const debtRatio = (totalMonthlyDebt / 2650) * 100;
    if (stats.balance < 0)
      return "🚨 Tu balance del mes es negativo — revisá en qué categorías podés recortar antes de que termine el mes.";
    if (debtRatio > 40)
      return `📊 Tus cuotas fijas son el ${debtRatio.toFixed(0)}% de tu sueldo. No tomes deuda nueva este mes y destiná cualquier ingreso extra a amortizar la de menor saldo.`;
    if (healthScore < 50)
      return "⚠️ Tu salud financiera necesita atención. Intentá destinar al menos €100 extra por mes a reducir deuda antes de diciembre.";
    if (stats.balance > 200)
      return `✅ Cerrás bien el mes con €${stats.balance.toFixed(0)} de margen. Aprovechá para sumar algo al fondo de emergencia.`;
    return "📌 Mantené el control de las cuotas fijas y apuntá a no agregar gastos variables hasta fin de mes.";
  }, [stats, healthScore, totalMonthlyDebt]);

  return (
    <div style={{background:"#0d1117",border:"1px solid #1e3a1e",borderRadius:12,padding:"14px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <span>✦</span>
        <span style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:700,color:"#4ade80"}}>Consejo del mes</span>
      </div>
      <div style={{fontSize:13,color:"#94a3b8",lineHeight:1.6}}>{tip}</div>
    </div>
  );
}

function JunePlanner() {
  const RENT   = 608;
  const CUOTAS = 626.96;

  const [income,  setIncome]  = useState(3100);
  const [german,  setGerman]  = useState(500);
  const [jesus,   setJesus]   = useState(800);
  const [franco,  setFranco]  = useState(100);
  const [elvira,  setElvira]  = useState(100);
  const [milena,  setMilena]  = useState(0);
  const [weekly,       setWeekly]       = useState(100);
  const [vinted,       setVinted]       = useState(300);
  const [shopify,      setShopify]      = useState(0);
  const [shopifyInvest,setShopifyInvest]= useState(0);
  const [ventaExtra,   setVentaExtra]   = useState(0);

  const living      = weekly * 4;
  const netShopify  = shopify - shopifyInvest;
  const totalIncome = income + vinted + shopify + ventaExtra;
  const fixed     = RENT + CUOTAS;
  const committed = german + jesus;
  const optional  = franco + elvira + milena;
  const totalOut  = fixed + committed + optional + living + shopifyInvest;
  const balance   = totalIncome - totalOut;
  const balColor  = balance >= 0 ? "#4ade80" : "#f87171";

  const scenario = (amt) => { setFranco(amt); setElvira(amt); setMilena(amt); };

  function SliderRow({ label, value, setValue, max, color }) {
    color = color || "#6366f1";
    return (
      <div style={{ marginBottom:18 }}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6, fontSize:13 }}>
          <span style={{ color:"#94a3b8" }}>{label}</span>
          <span style={{ color, fontWeight:700, fontFamily:"'Syne',sans-serif", fontSize:15 }}>€{value.toFixed(0)}</span>
        </div>
        <input type="range" min={0} max={max} step={10} value={value}
          onChange={e => setValue(Number(e.target.value))}
          style={{ accentColor: color }} />
        <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#334155", marginTop:2 }}>
          <span>€0</span><span>€{max}</span>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

      {/* Resultado grande */}
      <div className="card" style={{ background:balance>=0?"#0d1a0d":"#1a0505", borderColor:balColor+"44", textAlign:"center", padding:28 }}>
        <div style={{ fontSize:11, color:"#475569", textTransform:"uppercase", letterSpacing:".1em", marginBottom:8 }}>Balance proyectado · Junio 2026</div>
        <div style={{ fontSize:48, fontWeight:800, color:balColor, fontFamily:"'Syne',sans-serif", lineHeight:1 }}>
          {balance>=0?"+":""}{fmtDec(balance)}
        </div>
        <div style={{ fontSize:12, color:"#475569", marginTop:10 }}>
          {fmtDec(totalIncome)} ingresos — {fmtDec(totalOut)} gastos totales
        </div>
      </div>

      {/* Ingreso */}
      <div className="card">
        <div style={{ fontFamily:"'Syne',sans-serif", fontSize:13, fontWeight:700, color:"#c7d2fe", marginBottom:12 }}>💰 Ingresos estimados</div>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
          <span style={{ fontSize:13, color:"#94a3b8", flex:1 }}>Sueldo junio</span>
          <input className="input" type="number" value={income}
            onChange={e => setIncome(Number(e.target.value))}
            style={{ width:110, textAlign:"right" }} />
        </div>
        <SliderRow label={`🛍️ Vinted · ${Math.round(vinted/60)} ventas estimadas`} value={vinted} setValue={setVinted} max={600} color="#4ade80" />

        {/* Shopify */}
        <div style={{ borderTop:"1px solid #1e1e2e", paddingTop:16, marginTop:4 }}>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:12, fontWeight:700, color:"#a5b4fc", marginBottom:14, letterSpacing:".04em" }}>SHOPIFY</div>
          <SliderRow label="🛒 Ventas estimadas" value={shopify} setValue={setShopify} max={3000} color="#818cf8" />
          <SliderRow label="📦 Inversión (stock, ads, etc.)" value={shopifyInvest} setValue={setShopifyInvest} max={shopify||1} color="#f87171" />
          <div style={{ background: netShopify>=0?"#6366f111":"#f8717111", border:`1px solid ${netShopify>=0?"#6366f133":"#f8717133"}`, borderRadius:8, padding:"8px 12px", fontSize:13, display:"flex", justifyContent:"space-between", marginBottom:4 }}>
            <span style={{ color:"#64748b" }}>Ganancia neta Shopify</span>
            <span style={{ color: netShopify>=0?"#818cf8":"#f87171", fontWeight:700 }}>{netShopify>=0?"+":""}{fmtDec(netShopify)}</span>
          </div>
        </div>

        {/* Venta extra */}
        <div style={{ borderTop:"1px solid #1e1e2e", paddingTop:16, marginTop:4 }}>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:12, fontWeight:700, color:"#fbbf24", marginBottom:14, letterSpacing:".04em" }}>VENTA PUNTUAL</div>
          <SliderRow label="🏍️ Moto / tech del hogar / artículo" value={ventaExtra} setValue={setVentaExtra} max={5000} color="#fbbf24" />
        </div>

        <div style={{ background:"#4ade8011", border:"1px solid #4ade8022", borderRadius:8, padding:"8px 12px", fontSize:13, display:"flex", justifyContent:"space-between", marginTop:8 }}>
          <span style={{ color:"#64748b" }}>Total ingresos</span>
          <span style={{ color:"#4ade80", fontWeight:700 }}>{fmtDec(totalIncome)}</span>
        </div>
      </div>

      {/* Fijos */}
      <div className="card" style={{ background:"#0f0f1a" }}>
        <div style={{ fontFamily:"'Syne',sans-serif", fontSize:13, fontWeight:700, color:"#c7d2fe", marginBottom:12 }}>📌 Gastos fijos (inamovibles)</div>
        {[["🏠 Alquiler", RENT],["📅 Cuotas banco (AIB + Revolut)", CUOTAS]].map(([l,v])=>(
          <div key={l} style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:8 }}>
            <span style={{ color:"#64748b" }}>{l}</span>
            <span style={{ color:"#f87171" }}>-{fmtDec(v)}</span>
          </div>
        ))}
        <div style={{ borderTop:"1px solid #1e1e2e", paddingTop:8, display:"flex", justifyContent:"space-between", fontWeight:700, fontSize:13 }}>
          <span style={{ color:"#94a3b8" }}>Subtotal fijos</span>
          <span style={{ color:"#f87171" }}>-{fmtDec(fixed)}</span>
        </div>
        <div style={{ marginTop:8, fontSize:11, color:"#334155" }}>
          Quedan disponibles tras fijos: <span style={{ color:"#fbbf24" }}>{fmtDec(income - fixed)}</span>
        </div>
      </div>

      {/* Deudas comprometidas */}
      <div className="card">
        <div style={{ fontFamily:"'Syne',sans-serif", fontSize:13, fontWeight:700, color:"#c7d2fe", marginBottom:16 }}>⊖ Pagos comprometidos</div>
        <SliderRow label="Germán" value={german} setValue={setGerman} max={500} color="#fb923c" />
        <SliderRow label="Jesús ⚠️ vence 30/05" value={jesus} setValue={setJesus} max={800} color="#f87171" />
        <div style={{ borderTop:"1px solid #1e1e2e", paddingTop:8, display:"flex", justifyContent:"space-between", fontWeight:700, fontSize:13 }}>
          <span style={{ color:"#94a3b8" }}>Subtotal</span>
          <span style={{ color:"#fb923c" }}>-{fmtDec(committed)}</span>

      {/* Pagos parciales */}
      <div className="card">
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:8 }}>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:13, fontWeight:700, color:"#c7d2fe" }}>🤝 Pagos parciales (a elegir)</div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {[0,50,100,150,200].map(n=>(
              <button key={n} onClick={()=>scenario(n)}
                style={{ padding:"4px 10px", fontSize:11, background: franco===n&&elvira===n&&milena===n?"#6366f1":"#1e1e2e",
                  color: franco===n&&elvira===n&&milena===n?"white":"#94a3b8",
                  border:"1px solid #2e2e4e", borderRadius:6, cursor:"pointer", fontFamily:"inherit" }}>
                €{n}c/u
              </button>
            ))}
          </div>
        </div>
        <SliderRow label="Franco" value={franco} setValue={setFranco} max={500} color="#a5b4fc" />
        <SliderRow label="Elvira" value={elvira} setValue={setElvira} max={500} color="#a5b4fc" />
        <SliderRow label="Milena" value={milena} setValue={setMilena} max={500} color="#a5b4fc" />
        <div style={{ borderTop:"1px solid #1e1e2e", paddingTop:8, display:"flex", justifyContent:"space-between", fontWeight:700, fontSize:13 }}>
          <span style={{ color:"#94a3b8" }}>Subtotal parciales</span>
          <span style={{ color:"#a5b4fc" }}>-{fmtDec(optional)}</span>
        </div>
      </div>

      {/* Gastos de vida */}
      <div className="card">
        <div style={{ fontFamily:"'Syne',sans-serif", fontSize:13, fontWeight:700, color:"#c7d2fe", marginBottom:4 }}>🛒 Gastos de vida</div>
        <div style={{ fontSize:11, color:"#475569", marginBottom:16 }}>Ingresá el gasto semanal — el mes se calcula × 4</div>
        <SliderRow label="Por semana" value={weekly} setValue={setWeekly} max={400} color="#fbbf24" />
        <div style={{ background:"#fbbf2411", border:"1px solid #fbbf2422", borderRadius:8, padding:"8px 12px", fontSize:13, display:"flex", justifyContent:"space-between" }}>
          <span style={{ color:"#64748b" }}>Total mensual (× 4 semanas)</span>
          <span style={{ color:"#fbbf24", fontWeight:700 }}>{fmtDec(living)}</span>
        </div>
      </div>

      {/* Tabla resumen */}
      <div className="card" style={{ background:"#0a0a0f" }}>
        <div style={{ fontFamily:"'Syne',sans-serif", fontSize:13, fontWeight:700, color:"#c7d2fe", marginBottom:14 }}>📋 Resumen junio</div>
        {[
          ["💰 Sueldo",                 +income,     "#4ade80"],
          ["🛍️ Vinted",               +vinted,     "#4ade80"],
          ["🛒 Shopify ventas",        +shopify,    "#818cf8"],
          ["🏍️ Venta puntual",        +ventaExtra, "#fbbf24"],
          ["📦 Shopify inversión",     -shopifyInvest, "#f87171"],
          ["🏠 Alquiler",              -RENT,       "#f87171"],
          ["📅 Cuotas banco",          -CUOTAS,     "#f87171"],
          ["⊖ Germán",                 -german,     "#fb923c"],
          ["⊖ Jesús",                  -jesus,      "#fb923c"],
          ["🤝 Franco",                -franco,     "#a5b4fc"],
          ["🤝 Elvira",                -elvira,     "#a5b4fc"],
          ["🤝 Milena",                -milena,     "#a5b4fc"],
          ["🛒 Gastos de vida",        -living,     "#fbbf24"],
        ].map(([l,v,c])=>(
          <div key={l} style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:8 }}>
            <span style={{ color:"#64748b" }}>{l}</span>
            <span style={{ color:c, fontWeight:500 }}>{v>=0?"+":""}{fmtDec(v)}</span>
          </div>
        ))}
        <div style={{ borderTop:"1px solid #2e2e4e", paddingTop:12, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:14, color:"#e2e8f0" }}>Balance</span>
          <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:22, color:balColor }}>
            {balance>=0?"+":""}{fmtDec(balance)}
          </span>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
